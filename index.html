<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elegant Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap');

body {
  margin: 0;
  background: #f5f0e6;
  font-family: 'Playfair Display', serif;
}

/* VIDEO */
.video-container {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(245,240,230,0.15));
}

/* NAME */
.name {
  position: absolute;
  top: 42%;
  width: 100%;
  text-align: center;
  font-size: 42px;
  color: #f8f1e7;
  font-family: 'Cinzel', serif;
  letter-spacing: 3px;

  opacity: 0;
  transform: scale(0.8) translateY(25px);
  transition: all 1.8s ease;
  text-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.name.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* ✨ UPDATED ONLY THIS PART */
.wedding-title {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  color: #f5e6d3;
  font-family: 'Playfair Display', serif;
  letter-spacing: 4px;
  font-size: 14px;
  opacity: 0;
  transform: translateY(-10px);
}

/* smooth sequence (NEW ONLY ADDITION) */
.wedding-title.show {
  animation: fadeIn 1.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* TIMER TOP */
.countdown {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  color: #f5e6d3;
}

/* SOUND BUTTON (FIXED) */
.sound-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 46px;
  height: 46px;

  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(245, 240, 230, 0.12);
  border: 1px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);

  cursor: pointer;
  transition: 0.3s ease;
}

.sound-btn:hover {
  transform: scale(1.08);
  background: rgba(245, 240, 230, 0.2);
}

/* ICON */
.sound-icon {
  width: 22px;
  height: 22px;
  stroke: #f5e6d3;
  fill: none;
  stroke-width: 1.6;
}

/* BELOW SECTION */
.section {
  padding: 60px 20px;
}

/* TIMER CARDS */
.timer-grid {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: nowrap;        /* FIX */
  overflow-x: auto;         /* FIX iPhone scroll */
  -webkit-overflow-scrolling: touch;
  padding-bottom: 10px;
}

/* CARD */
.card {
  width: 80px;
  height: 90px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(180,160,120,0.35);
  border-radius: 14px;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}

.card h2 {
  margin: 0;
  font-size: 22px;
  color: #3a2f24;
}

.card p {
  margin: 0;
  font-size: 11px;
  opacity: 0.7;
}

/* VENUE */
.venue {
  text-align: center;
  margin-top: 60px;
}

.venue img {
  width: 90%;
  max-width: 320px;
  border-radius: 18px;
  border: 1px solid rgba(180,160,120,0.4);
}

.btn {
  margin-top: 10px;
  padding: 10px 18px;
  border: 1px solid #b89b6a;
  background: transparent;
  border-radius: 30px;
  cursor: pointer;
}

/* COUPLE */
.couple {
  text-align: center;
  margin-top: 60px;
}

.couple h2 {
  font-family: 'Cinzel';
}

/* TIMELINE */
.timeline {
  max-width: 400px;
  margin: 60px auto;
  border-left: 2px solid #b89b6a;
  padding-left: 20px;
}

.event {
  margin-bottom: 20px;
}

.event h4 {
  margin: 0;
}

.event span {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="video-container">

  <video id="video" autoplay muted loop playsinline>
    <source src="فيديو.mp4">
  </video>

  <div class="overlay"></div>

  <!-- THE WEDDING OF -->
  <div class="wedding-title" id="wedding">THE WEDDING OF</div>

  <div id="name" class="name">Mays & Rami</div>

  <div class="countdown">
    <div id="timerTop"></div>
  </div>

  <div class="sound-btn" id="soundBtn">
    <svg id="icon" class="sound-icon" viewBox="0 0 24 24">
      <path d="M11 5L6 9H3v6h3l5 4V5z"></path>
      <path id="wave1" d="M15 9c1 1 1 5 0 6"></path>
      <path id="wave2" d="M18 7c2 2 2 9 0 11"></path>
    </svg>
  </div>

</div>

<div class="section">

  <div class="timer-grid">
    <div class="card"><h2 id="d">0</h2><p>DAYS</p></div>
    <div class="card"><h2 id="h">0</h2><p>HOURS</p></div>
    <div class="card"><h2 id="m">0</h2><p>MIN</p></div>
    <div class="card"><h2 id="s">0</h2><p>SEC</p></div>
  </div>

  <div class="venue">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPyxAj3WGRB8vDkFlK_SZCOoC1U4fGBVfPUarIIPyY2RLHxVoSTomI_HA&s=10">
    <h3>Wedding Hall</h3>
    <button class="btn">Open Location</button>
  </div>

  <div class="couple">
    <h2>We are getting married</h2>
    <p>You are warmly invited to celebrate our special day</p>
  </div>

</div>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("soundBtn");
const wave1 = document.getElementById("wave1");
const wave2 = document.getElementById("wave2");

video.muted = true;

btn.addEventListener("click", () => {
  video.muted = !video.muted;

  if (video.muted) {
    wave1.style.opacity = "0.2";
    wave2.style.opacity = "0.2";
  } else {
    wave1.style.opacity = "1";
    wave2.style.opacity = "1";
  }
});

/* SEQUENCE FIX (NEW ONLY) */
setTimeout(() => {
  document.getElementById("wedding").classList.add("show");
}, 600);

setTimeout(() => {
  document.getElementById("name").classList.add("show");
}, 1600);

/* TIMER */
const targetDate = new Date("Jun 12, 2026 00:00:00").getTime();

function update() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("d").innerText = d;
  document.getElementById("h").innerText = h;
  document.getElementById("m").innerText = m;
  document.getElementById("s").innerText = s;

  document.getElementById("timerTop").innerText =
    `${d}d : ${h}h : ${m}m : ${s}s`;
}

setInterval(update,1000);
update();

</script>

</body>
</html>
